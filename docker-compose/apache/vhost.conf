<VirtualHost *:80>
    DocumentRoot "/var/www/html"
    ServerName localhost
    <Directory "/var/www/html">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
     # Proxy vers le container PHP sur le port 9000
    ProxyPassMatch ^/(.*\.php(/.*)?)$ fcgi://php:9000/var/www/html/$1
</VirtualHost>
